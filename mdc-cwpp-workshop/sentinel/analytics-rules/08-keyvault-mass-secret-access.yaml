id: 7a9a3f9c-8c40-4e9f-9b3d-1a2b3c4d5e08
kind: Scheduled
name: Key Vault — Mass secret enumeration
description: A single identity reading > N secrets in a short window, across one or more vaults.
severity: High
status: Available
requiredDataConnectors:
  - connectorId: AzureKeyVault
    dataTypes:
      - KeyVaultData
queryFrequency: 10m
queryPeriod: 1h
triggerOperator: gt
triggerThreshold: 0
tactics:
  - Discovery
  - CredentialAccess
relevantTechniques:
  - T1087
  - T1552
query: |
  let threshold = 20;
  KeyVaultData
  | where TimeGenerated > ago(1h)
  | where OperationName in ("SecretGet", "SecretList", "SecretListVersions")
  | where ResultType == "Success"
  | summarize SecretsAccessed=dcount(id_s), Ops=count(), Vaults=dcount(Resource)
            by identity_claim_unique_name_s, CallerIPAddress, bin(TimeGenerated, 15m)
  | where SecretsAccessed > threshold or Ops > threshold * 3
entityMappings:
  - entityType: Account
    fieldMappings:
      - identifier: UPNSuffix
        columnName: identity_claim_unique_name_s
  - entityType: IP
    fieldMappings:
      - identifier: Address
        columnName: CallerIPAddress
incidentConfiguration:
  createIncident: true
