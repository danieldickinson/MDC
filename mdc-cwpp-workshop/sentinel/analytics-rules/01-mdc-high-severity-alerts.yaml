id: 7a9a3f9c-8c40-4e9f-9b3d-1a2b3c4d5e01
kind: Scheduled
name: MDC — High-severity CWPP alert correlation
description: |
  Surfaces all High/Critical severity alerts generated by Microsoft Defender for Cloud
  (any CWPP plan) within the last 30 minutes, grouped by compromised entity.
severity: High
status: Available
requiredDataConnectors:
  - connectorId: AzureSecurityCenter
    dataTypes:
      - SecurityAlert
queryFrequency: 15m
queryPeriod: 30m
triggerOperator: gt
triggerThreshold: 0
suppressionDuration: 1h
suppressionEnabled: false
tactics:
  - InitialAccess
  - Execution
  - PrivilegeEscalation
relevantTechniques:
  - T1078
  - T1059
  - T1611
query: |
  SecurityAlert
  | where TimeGenerated > ago(30m)
  | where ProviderName == "Azure Security Center"
  | where AlertSeverity in ("High", "Critical")
  | extend ResourceType = tostring(parse_json(ExtendedProperties).["Resource type"])
  | extend Plan = tostring(parse_json(ExtendedProperties).["Defender plan"])
  | summarize AlertNames=make_set(AlertName), Count=count(),
              FirstSeen=min(TimeGenerated), LastSeen=max(TimeGenerated)
            by CompromisedEntity, ResourceType, Plan, AlertSeverity
entityMappings:
  - entityType: Host
    fieldMappings:
      - identifier: HostName
        columnName: CompromisedEntity
eventGroupingSettings:
  aggregationKind: SingleAlert
incidentConfiguration:
  createIncident: true
  groupingConfiguration:
    enabled: true
    reopenClosedIncident: false
    lookbackDuration: 1h
    matchingMethod: AllEntities
